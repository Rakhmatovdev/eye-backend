services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: intelligence_db
      POSTGRES_USER: intel_user
      POSTGRES_PASSWORD: intel_pass123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intel_user -d intelligence_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
